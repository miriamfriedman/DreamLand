
<div class="container">
  <img src={{ById.image}} alt="תמונה" class="product-image">
  <div class="product-details">
      <h1 class="name"> product name: {{ById.prodName}}</h1>
      <h4 class="desc">description: {{ById.description}}</h4>
      <h2 class="title">price: {{ById.price}}</h2>
      <h4 class="qty"> in stack: {{ById.stockQty}}</h4>
  <img [src]="'company/'+ById.companyCode+'.jpg'" alt="Toy 1" class="toy-image"> 
  </div>
</div>
